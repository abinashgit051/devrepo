<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My DevOps POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #22c55e22;
      color: #22c55e;
      border: 1px solid #22c55e55;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 13px;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f8fafc;
    }

    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .stack {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #7dd3fc;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">it is Live on Kubernetes env now.</div>
    <h1>DevOps POC</h1>
    <p>This container was built with Docker, pushed via GitHub Actions, and deployed automatically to a GKE cluster.</p>
    <div class="stack">
      <span class="tag">Nginx</span>
      <span class="tag">Docker</span>
      <span class="tag">Kubernetes</span>
      <span class="tag">GitHub Actions</span>
    </div>
    <div class="footer">Deployed automatically on every push to main</div>
  </div>
</body>
</html>
